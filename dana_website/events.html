<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events | DANA</title>
    <meta name="description" content="DANA meetings, cleanups, gatherings, and past notes." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header" data-header></header>
    <main id="main">
      <section class="page-hero">
        <div class="shell">
          <p class="eyebrow">Events</p>
          <h1>More than meetings.</h1>
          <p>Come hear what is happening, meet people who live nearby, and help with the work in front of us.</p>
        </div>
      </section>
      <section class="section">
        <div class="shell">
          <div class="event-toolbar" role="group" aria-label="Event view">
            <button class="is-active" type="button" data-event-filter="upcoming">Coming up</button>
            <button type="button" data-event-filter="past">Past notes</button>
            <button type="button" data-event-filter="all">All</button>
          </div>
          <div class="event-grid event-grid-wide" data-events-all></div>
        </div>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <script src="script.js"></script>
  </body>
</html>
